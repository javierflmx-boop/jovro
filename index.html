<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="JOVRO Field"/>
<meta name="theme-color" content="#111"/>
<title>JOVRO Field</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap');

  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#f0ece4;
    --surface:#e8e3d8;
    --surface2:#ddd8cc;
    --border:#ccc8bc;
    --faint:#d4d0c4;
    --mid:#8a8478;
    --sub:#6a6560;
    --ink:#1a1814;
    --ink2:#3a3830;
    --header:#f0ece4;
    --accent:#e85d2f;
    --accent2:#c44820;
    --yellow:#e8a820;
    --brown:#5a3e2e;
    --charcoal:#2e2c28;
    --green:#4a7a58;
    --red:#c04840;
    --blue:#3a5878;
    --card-terra:#e85d2f;
    --card-brown:#7a5840;
    --card-dark:#2e2c28;
    --card-warm:#d4c8a8;
  }
  body{
    font-family:'DM Sans',-apple-system,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    font-weight:300;
    -webkit-font-smoothing:antialiased;
  }
  #app{padding-bottom:80px;}

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
    margin-bottom:8px;
  }

  /* ── HERO JOB CARD ── */
  .hero-card{
    border-radius:18px;
    padding:22px 20px;
    margin-bottom:10px;
    position:relative;
    overflow:hidden;
    min-height:110px;
  }
  .hero-card.terra{ background:var(--card-terra); color:#fff; }
  .hero-card.dark{ background:var(--card-dark); color:#f0ece4; }
  .hero-card.warm{ background:var(--card-warm); color:var(--ink); }
  .hero-card.brown{ background:var(--card-brown); color:#f0ece4; }
  .hero-card.yellow{ background:var(--yellow); color:var(--ink); }

  /* ── NAV BAR ── */
  .nav-bar{
    position:fixed;bottom:0;left:0;right:0;
    background:rgba(240,236,228,0.95);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border-top:1px solid var(--border);
    display:flex;
    padding-bottom:env(safe-area-inset-bottom);
    z-index:100;
  }
  .nav-item{
    flex:1;background:none;border:none;
    padding:10px 4px 8px;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--mid);font-size:9px;font-weight:500;letter-spacing:1.5px;
    text-transform:uppercase;cursor:pointer;
    font-family:'DM Sans',sans-serif;
  }
  .nav-item.active{color:var(--accent);}
  .nav-icon{font-size:19px;line-height:1;}

  /* ── TOP BAR ── */
  .top-bar{
    position:sticky;top:0;z-index:50;
    background:rgba(240,236,228,0.95);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:12px;
    padding:14px 16px;
    min-height:54px;
  }
  .top-bar div{
    font-family:'Bebas Neue',sans-serif;
    font-size:22px;letter-spacing:2px;
    color:var(--ink);font-weight:400;
  }

  /* ── BUTTONS ── */
  .btn-primary{
    background:var(--accent);color:#fff;border:none;
    border-radius:10px;padding:14px 24px;
    font-size:13px;font-weight:600;letter-spacing:0.5px;
    cursor:pointer;width:100%;
    font-family:'DM Sans',sans-serif;
  }
  .btn-ghost{
    background:var(--surface2);color:var(--ink);
    border:1px solid var(--border);border-radius:10px;
    padding:12px 16px;font-size:13px;font-weight:400;
    cursor:pointer;font-family:'DM Sans',sans-serif;
  }

  /* ── TABS ── */
  .tab-btn{
    flex:1;background:none;border:none;
    padding:12px 6px;font-size:9px;font-weight:500;
    letter-spacing:2px;text-transform:uppercase;
    color:var(--mid);cursor:pointer;
    border-bottom:2px solid transparent;
    font-family:'DM Sans',sans-serif;
  }
  .tab-btn.active{color:var(--accent);border-bottom:2px solid var(--accent);}

  .badge{
    font-size:9px;font-weight:600;letter-spacing:1px;
    text-transform:uppercase;padding:3px 8px;border-radius:6px;
  }

  input,textarea,select{
    width:100%;background:var(--surface);
    border:1px solid var(--border);border-radius:10px;
    padding:13px 14px;color:var(--ink);
    font-size:15px;font-weight:300;
    font-family:'DM Sans',inherit;outline:none;display:block;
    transition:border-color 0.15s;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  select option{background:var(--surface);}
  textarea{min-height:90px;resize:none;}
  .field-label{
    font-size:9px;font-weight:600;letter-spacing:2px;
    text-transform:uppercase;color:var(--mid);
    margin-bottom:8px;display:block;font-family:'DM Sans',sans-serif;
  }

  .sheet-overlay{
    position:fixed;inset:0;z-index:200;
    background:var(--bg);
    transform:translateX(100%);
    transition:transform 0.26s cubic-bezier(0.4,0,0.2,1);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .sheet-overlay.open{
    transform:translateX(0);
  }
  .sheet-bg{ display:none; }
  .sheet-body{
    position:relative;
    background:var(--bg);
    padding:0 0 100px 0;
    min-height:100%;
  }
  .sheet-handle{ display:none; }
  .empty{
    color:var(--mid);font-size:14px;font-weight:300;
    text-align:center;padding:56px 20px;
    font-family:'DM Sans',sans-serif;
  }
  .pulse{animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  canvas{touch-action:none;}
  .ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div id="splash" style="
  position:fixed;inset:0;
  background:#f0ece4;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;
  transition:opacity 0.7s ease;
">
  <div style="position:absolute;width:320px;height:320px;background:radial-gradient(circle,rgba(232,93,47,0.15) 0%,transparent 70%);border-radius:50%;pointer-events:none;"></div>
  <div style="width:96px;height:96px;background:#e85d2f;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:46px;margin-bottom:28px;box-shadow:0 8px 32px rgba(232,93,47,0.35);">🏗️</div>
  <div style="font-family:Bebas Neue,sans-serif;font-size:52px;color:#1a1814;letter-spacing:6px;line-height:1;margin-bottom:6px;">JOVRO</div>
  <div style="font-size:11px;font-weight:500;color:#8a8478;letter-spacing:5px;text-transform:uppercase;margin-bottom:48px;">FIELD</div>
  <div style="width:64px;height:2px;background:#ccc8bc;border-radius:2px;">
    <div id="splash-bar" style="height:2px;background:#e85d2f;border-radius:2px;width:0%;transition:width 1.8s cubic-bezier(0.4,0,0.2,1);"></div>
  </div>
</div>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script>
  window.addEventListener("load",function(){
    setTimeout(function(){var b=document.getElementById("splash-bar");if(b)b.style.width="100%";},50);
    setTimeout(function(){var s=document.getElementById("splash");if(s){s.style.opacity="0";setTimeout(function(){s.style.display="none";},700);}},2200);
  });
</script>

<div id="app"></div>
<script>
// VERSION: CLEAN-3
// ─── COLORS & DARK ───────────────────────────────────────────
const COLORS=["#E07B54","#5B8DD9","#57A773","#9B6EC8","#D4A843","#D96B8A"];
// VERSION: CLEAN-3
// ─── COLORS & DARK ───────────────────────────────────────────
const COLORS=["#E07B54","#5B8DD9","#57A773","#9B6EC8","#D4A843","#D96B8A"];
let dark=localStorage.getItem("fm-dark")==="1";
if(dark)document.body.classList.add("dark");

// ─── STATE ───────────────────────────────────────────────────
let state={
  nav:"field",
  detailId:null, detailType:null, detailTab:"notes",
  sheet:null, sheetPid:null, form:{},
  projects:JSON.parse(localStorage.getItem("fm-projects")||"[]"),
  clients:JSON.parse(localStorage.getItem("fm-clients")||"[]"),
  portfolio:JSON.parse(localStorage.getItem("fm-portfolio")||"[]"),
  clocks:{},
  docs:JSON.parse(localStorage.getItem("fm-docs")||"[]"),
  expenses:JSON.parse(localStorage.getItem("fm-expenses")||"[]"),
  services:JSON.parse(localStorage.getItem("fm-services")||"[]")
};

// ─── HELPERS ─────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2);
const pad=n=>String(n).padStart(2,"0");
const fmtTimer=s=>`${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`;
const fmtHours=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return m>0?`${h}h ${m}m`:`${h}h`;};
const nowTime=()=>new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false});
const nowDate=()=>new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
const liveSec=pid=>state.clocks[pid]?Math.floor((Date.now()-state.clocks[pid])/1000):0;
const proj=pid=>state.projects.find(p=>p.id===pid);
const client=cid=>state.clients.find(c=>c.id===cid);
const money=n=>"$"+Number(n||0).toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});
const val=id=>document.getElementById(id)?.value||"";
const esc=s=>String(s||"").replace(/'/g,"&#39;").replace(/"/g,"&quot;");

function setProj(pid,fn){state.projects=state.projects.map(p=>p.id===pid?fn(p):p);save();}
function addLog(pid,text){setProj(pid,p=>({...p,log:[{id:uid(),ts:`${nowDate()} · ${nowTime()}`,text},...p.log]}));}
function save(){
  localStorage.setItem("fm-projects",JSON.stringify(state.projects));
  localStorage.setItem("fm-clients",JSON.stringify(state.clients));
  localStorage.setItem("fm-portfolio",JSON.stringify(state.portfolio));
localStorage.setItem("fm-recurring",JSON.stringify(state.recurring));
  localStorage.setItem("fm-docs",JSON.stringify(state.docs));
  localStorage.setItem("fm-expenses",JSON.stringify(state.expenses));
  localStorage.setItem("fm-services",JSON.stringify(state.services));
}

// ─── PROJECT ACTIONS ─────────────────────────────────────────


function pickColor(el){state.form.color=el.dataset.color;document.querySelectorAll(".cdot").forEach(function(d){d.style.outline="none";});el.style.outline="3px solid var(--accent)";}
function editClient(id){openSheet("newclient",null,{editId:id});}
function editPortfolio(id){openSheet("newportfolio",null,{editPfId:id});}
function editService(id){openSheet("newservice",null,{editSvcId:id});}



function fieldHeader(){
  var now = new Date();
  var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var monthShort = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var activeCount = Object.keys(state.clocks).length;
  var totalProjects = state.projects.filter(function(p){return !p.archived;}).length;

  // Month earnings from sessions
  var monthEarned = 0, monthMaterials = 0;
  var thisMonth = now.getMonth(), thisYear = now.getFullYear();
  state.projects.forEach(function(p){
    (p.sessions||[]).forEach(function(s){
      var d = new Date(s.date);
      if(d.getMonth()===thisMonth && d.getFullYear()===thisYear){
        monthEarned += (s.seconds/3600)*(p.hourlyRate||0);
      }
    });
  });
  // Expenses this month
  (state.expenses||[]).forEach(function(e){
    var d = new Date(e.date||"");
    if(d.getMonth()===thisMonth && d.getFullYear()===thisYear){
      monthMaterials += Number(e.amount||0);
    }
  });
  var net = monthEarned - monthMaterials;

  var h = '<div style="padding:18px 16px 0;">';

  // Header row
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">';
  h += '<div>';
  h += '<div style="font-size:11px;font-weight:500;color:var(--mid);letter-spacing:2px;text-transform:uppercase;">'+days[now.getDay()]+' · '+months[now.getMonth()]+' '+now.getFullYear()+'</div>';
  h += '<div style="font-family:Bebas Neue,sans-serif;font-size:32px;letter-spacing:2px;line-height:1.1;color:var(--ink);margin-top:2px;">MY FIELD</div>';
  h += '</div>';
  h += '<button onclick="addNewProject()" style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-top:2px;">+ New</button>';
  h += '</div>';

  // BIG hero card - total this month
  h += '<div style="background:var(--yellow);border-radius:18px;padding:22px 20px 18px;margin-bottom:10px;position:relative;overflow:hidden;">';
  h += '<div style="position:absolute;right:-20px;top:-20px;width:130px;height:130px;background:rgba(255,255,255,0.15);border-radius:50%;"></div>';
  h += '<div style="font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(26,24,20,0.6);margin-bottom:6px;">Earned This Month</div>';
  h += '<div style="font-family:Bebas Neue,sans-serif;font-size:46px;letter-spacing:-1px;line-height:1;color:var(--ink);">$'+Math.round(monthEarned).toLocaleString()+'</div>';
  if(net > 0) h += '<div style="font-size:13px;font-weight:500;color:var(--green);margin-top:4px;">Net $'+Math.round(net).toLocaleString()+' after expenses</div>';
  h += '<div style="font-size:11px;color:rgba(26,24,20,0.5);margin-top:10px;letter-spacing:1px;text-transform:uppercase;">'+totalProjects+' active jobs'+(activeCount>0?' · '+activeCount+' live now':'')+'</div>';
  h += '</div>';

  // Two cards: spending vs earning
  if(monthEarned > 0 || monthMaterials > 0){
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">';

    // Earning card
    h += '<div style="background:var(--green);border-radius:14px;padding:16px;">';
    h += '<div style="font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:8px;">Earning</div>';
    h += '<div style="font-family:Bebas Neue,sans-serif;font-size:28px;letter-spacing:0px;color:#fff;line-height:1;">$'+Math.round(monthEarned).toLocaleString()+'</div>';
    // Top 3 earning jobs
    var topJobs = state.projects.filter(function(p){return (p.hourlyRate||0)>0 && p.totalSeconds>0;}).slice(0,3);
    topJobs.forEach(function(p){
      var earned = (p.totalSeconds/3600)*(p.hourlyRate||0);
      h += '<div style="display:flex;justify-content:space-between;margin-top:8px;border-top:1px solid rgba(255,255,255,0.15);padding-top:8px;">';
      h += '<div style="font-size:11px;color:rgba(255,255,255,0.8);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;">'+esc(p.name)+'</div>';
      h += '<div style="font-size:11px;color:#fff;font-weight:600;">+$'+Math.round(earned).toLocaleString()+'</div>';
      h += '</div>';
    });
    h += '</div>';

    // Spending card
    h += '<div style="background:var(--accent);border-radius:14px;padding:16px;">';
    h += '<div style="font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:8px;">Spending</div>';
    h += '<div style="font-family:Bebas Neue,sans-serif;font-size:28px;color:#fff;line-height:1;">$'+Math.round(monthMaterials).toLocaleString()+'</div>';
    var topExp = (state.expenses||[]).filter(function(e){var d=new Date(e.date||"");return d.getMonth()===thisMonth && d.getFullYear()===thisYear;}).slice(0,3);
    topExp.forEach(function(e){
      h += '<div style="display:flex;justify-content:space-between;margin-top:8px;border-top:1px solid rgba(255,255,255,0.15);padding-top:8px;">';
      h += '<div style="font-size:11px;color:rgba(255,255,255,0.8);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(e.name||e.category||"")+'</div>';
      h += '<div style="font-size:11px;color:#fff;font-weight:600;">-$'+Math.round(Number(e.amount||0)).toLocaleString()+'</div>';
      h += '</div>';
    });
    if(!topExp.length) h += '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:8px;">No expenses logged</div>';
    h += '</div>';

    h += '</div>';
  }

  h += '</div>';
  return h;
}


function dashboardHTML(){
  var now = new Date();
  var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var thisMonth = now.getMonth(), thisYear = now.getFullYear();
  var activeCount = Object.keys(state.clocks).length;
  var projectCount = state.projects.filter(function(p){return !p.archived;}).length;
  var clientCount = (state.clients||[]).length;
  var serviceCount = (state.services||[]).length;
  var recurringCount = (state.recurring||[]).length;
  var docCount = (state.docs||[]).length;
  var monthEarned = 0, monthSpent = 0;
  state.projects.forEach(function(p){
    (p.sessions||[]).forEach(function(s){
      var d = new Date(s.date);
      if(d.getMonth()===thisMonth && d.getFullYear()===thisYear)
        monthEarned += (s.seconds/3600)*(p.hourlyRate||0);
    });
  });
  (state.expenses||[]).forEach(function(e){
    var d = new Date(e.date||"");
    if(d.getMonth()===thisMonth && d.getFullYear()===thisYear)
      monthSpent += Number(e.amount||0);
  });

  var h = '<div style="padding:20px 16px 60px;">';

  // Header
  h += '<div style="margin-bottom:22px;">';
  h += '<div style="font-size:10px;font-weight:600;color:var(--mid);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px;">'+days[now.getDay()]+' · '+months[now.getMonth()]+' '+now.getDate()+'</div>';
  h += '<div style="font-family:Bebas Neue,sans-serif;font-size:38px;letter-spacing:3px;line-height:1;color:var(--ink);">JOVRO FIELD</div>';
  h += '</div>';

  // Golden hero card — data-action=nav, data-nav=summary
  h += '<div data-action="nav" data-nav="summary" style="background:var(--yellow);border-radius:16px;padding:22px 20px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;">';
  h += '<div style="position:absolute;right:-16px;top:-16px;width:110px;height:110px;background:rgba(255,255,255,0.18);border-radius:50%;pointer-events:none;"></div>';
  h += '<div style="font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(26,24,20,0.5);margin-bottom:6px;">'+months[thisMonth]+' · Earned</div>';
  h += '<div style="font-family:Bebas Neue,sans-serif;font-size:52px;letter-spacing:-1px;line-height:1;color:var(--ink);">$'+Math.round(monthEarned).toLocaleString()+'</div>';
  h += '<div style="font-size:12px;color:rgba(26,24,20,0.5);margin-top:6px;">Net $'+Math.round(monthEarned-monthSpent).toLocaleString()+' after expenses'+(activeCount>0?' · <strong>'+activeCount+' LIVE</strong>':'')+'</div>';
  h += '</div>';

  // Section cards grid — all use data-action=section
  var sections = [
    {nav:"field",    label:"Projects",  count:projectCount,  bg:"#d4522a", light:false, desc:activeCount>0?activeCount+" live":"Tap to manage", full:true},
    {nav:"clients",  label:"Clients",   count:clientCount,   bg:"#2a2824", light:false, desc:"People",       full:false},
    {nav:"services", label:"Services",  count:serviceCount,  bg:"#e0dace", light:true,  desc:"Your rates",   full:false},
    {nav:"recurring",label:"Recurring", count:recurringCount,bg:"#7a5840", light:false, desc:"Repeat work",  full:false},
    {nav:"docs",     label:"Docs",      count:docCount,      bg:"#3a6b4a", light:false, desc:"Contracts",    full:false},
    {nav:"expenses", label:"Expenses",  count:0,             bg:"#2a3848", light:false, desc:"Materials",    full:false},
  ];

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
  sections.forEach(function(s){
    var tc = s.light ? "var(--ink)" : "#f0ece4";
    var mc = s.light ? "rgba(26,24,20,0.45)" : "rgba(240,236,228,0.45)";
    var gridStyle = s.full ? "grid-column:1/-1;" : "";
    var fontSize = s.full ? "64" : "52";
    h += '<div data-action="section" data-nav="'+s.nav+'" style="background:'+s.bg+';border-radius:14px;padding:18px 16px;cursor:pointer;position:relative;overflow:hidden;'+gridStyle+'">';
    h += '<div style="position:absolute;right:-10px;bottom:-10px;width:80px;height:80px;background:rgba(255,255,255,0.07);border-radius:50%;pointer-events:none;"></div>';
    h += '<div style="font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:'+mc+';margin-bottom:8px;">'+s.label+'</div>';
    h += '<div style="font-family:Bebas Neue,sans-serif;font-size:'+fontSize+'px;line-height:0.9;letter-spacing:-1px;color:'+tc+';">'+s.count+'</div>';
    h += '<div style="font-size:11px;color:'+mc+';margin-top:8px;">'+s.desc+'</div>';
    h += '</div>';
  });
  h += '</div>';

  // Live jobs strip
  if(activeCount > 0){
    h += '<div style="margin-top:10px;background:var(--charcoal);border-radius:14px;padding:16px;">';

      var p = proj(pid);
      if(!p) return;
      var ls = liveSec(pid);
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';

  setProj(pid,p=>({...p,totalSeconds:p.totalSeconds+secs,sessions:[...p.sessions,session]}));

function addRecurring(){openSheet("newrecurring",null);}
function editRecurring(id){openSheet("editrecurring",null,{rid:id});}
function markVisitDone(id){
  var r=state.recurring.find(function(x){return x.id===id;});
  if(!r) return;
  // Log the visit
  if(!r.visits) r.visits=[];
  var today=new Date();
  r.visits.push({date:today.toISOString().slice(0,10),amount:r.price});
  // Calculate next date based on schedule
  var next=new Date(today);
  if(r.schedule==="Weekly") next.setDate(next.getDate()+7);
  else if(r.schedule==="Biweekly") next.setDate(next.getDate()+14);
  else if(r.schedule==="Monthly") next.setMonth(next.getMonth()+1);
  else if(r.schedule==="Bimonthly") next.setDate(next.getDate()+60);
  else if(r.schedule==="Quarterly") next.setMonth(next.getMonth()+3);
  else next.setMonth(next.getMonth()+1);
  r.nextDate=next.toISOString().slice(0,10);
  state.recurring=state.recurring.map(function(x){return x.id===id?r:x;});
  save();render();
}

function delRecurring(id){
  if(!confirm("Delete this recurring service?")) return;
  state.recurring=state.recurring.filter(function(x){return x.id!==id;});
  save();render();
}

function saveRecurring(){
  var isEdit=state.form.rid;
  var existing=isEdit?state.recurring.find(function(x){return x.id===state.form.rid;}):null;
  var r={
    id:existing?existing.id:uid(),
    clientName:val("rec-client"),
    service:val("rec-service"),
    price:Number(val("rec-price"))||0,
    schedule:val("rec-schedule"),
    nextDate:val("rec-nextdate"),
    visits:existing?existing.visits||[]:[],
    notes:val("rec-notes")
  };
  if(!r.clientName.trim()||!r.service.trim()) return;
  if(isEdit){
    state.recurring=state.recurring.map(function(x){return x.id===r.id?r:x;});
  } else {
    state.recurring=[r,...state.recurring];
  }
  save();closeSheet();
}

    <button data-id="${p.id}" onclick="openSheet('photo',this.dataset.id)" class="btn-ghost" style="flex:1;font-size:12px;">📷</button>

  </div>`:`<div style="padding:12px 16px;background:var(--card);border-bottom:1px solid var(--faint);display:flex;gap:8px;">

      <div style="flex:1;"><div style="font-size:15px;line-height:1.5;text-decoration:${n.done?"line-through":"none"};">${n.text}</div><div style="font-size:11px;color:var(--mid);margin-top:3px;">${n.ts}</div></div>
      <button data-pid="${p.id}" data-nid="${n.id}" onclick="doDelNote(this)" style="background:none;border:none;color:var(--mid);font-size:22px;cursor:pointer;padding:0;line-height:1;">×</button>
    </div>`).join("")||`<div class="empty">No notes yet</div>`;
    content=`<button data-id="${p.id}" onclick="openSheet('note',this.dataset.id)" class="btn-ghost" style="width:100%;margin-bottom:14px;">+ Add Note</button>${items}`;
  }
  else if(t==="shopping"){
    const pending=p.shopping.filter(s=>!s.done),bought=p.shopping.filter(s=>s.done);
    const pItems=pending.map(s=>`<div class="card" style="display:flex;align-items:center;gap:12px;">
      <button data-pid="${p.id}" data-sid="${s.id}" onclick="doToggleShop(this)" style="width:24px;height:24px;border-radius:7px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;"></button>

      <button data-pid="${p.id}" data-sid="${s.id}" onclick="doDelShop(this)" style="background:none;border:none;color:var(--mid);font-size:22px;cursor:pointer;padding:0;">×</button>
    </div>`).join("");
    const bItems=bought.length?`<div style="font-size:11px;color:var(--mid);letter-spacing:2px;text-transform:uppercase;margin:18px 0 10px;">Bought</div>${bought.map(s=>`
      <div class="card" style="display:flex;align-items:center;gap:12px;opacity:.5;">
        <button data-pid="${p.id}" data-sid="${s.id}" onclick="doToggleShop(this)" style="width:24px;height:24px;border-radius:7px;border:2px solid ${p.color};background:${p.color};cursor:pointer;flex-shrink:0;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;">✓</button>
        <span style="flex:1;font-size:15px;text-decoration:line-through;">${s.text}</span>
        <button data-pid="${p.id}" data-sid="${s.id}" onclick="doDelShop(this)" style="background:none;border:none;color:var(--mid);font-size:22px;cursor:pointer;padding:0;">×</button>
      </div>`).join("")}`:"";

  }
  else if(t==="photos"){
    const photos=p.photos||[];

      <img src="${ph.src}" style="width:100%;max-height:240px;object-fit:cover;display:block;"/>
      ${ph.note||ph.ts?`<div style="padding:12px 16px;">${ph.note?`<div style="font-size:14px;margin-bottom:3px;">${ph.note}</div>`:""}
      <div style="font-size:11px;color:var(--mid);">${ph.ts}</div></div>`:""}
    </div>`).join("")||`<div class="empty">No photos yet.<br/>Document your work as you go.</div>`;
    content=`<button data-id="${p.id}" onclick="openSheet('photo',this.dataset.id)" class="btn-ghost" style="width:100%;margin-bottom:14px;">📷 Add Photo</button>${items}`;
  }
  else if(t==="docs"){

    var docCards="";

  else if(t==="sessions"){
    const sessions=[...p.sessions].reverse();

    <button onclick="goBack()" style="background:none;border:none;font-size:24px;cursor:pointer;color:var(--mid);padding:0;line-height:1;flex-shrink:0;">←</button>

    <div style="text-align:right;flex-shrink:0;">
      <div style="font-size:18px;font-weight:700;color:${isActive?p.color:"var(--ink)"};" id="detail-total">${fmtHours(p.totalSeconds+ls)}</div>
      ${p.hourlyRate?`<div style="font-size:12px;color:var(--green);font-weight:600;">${money(totalEarned)}</div>`:""}
      ${isActive?`<div style="font-size:10px;color:${p.color};font-variant-numeric:tabular-nums;" id="detail-timer">${fmtTimer(ls)}</div>`:""}
    </div>
  </div>
  ${actionBar}
  ${(()=>{
    const pct=getProjectProgress(p);
    const bd=getBalanceDue(p);
    const contractTotal=bd.contractTotal,collected=bd.collected,balance=bd.balance;
    if(pct==null&&!contractTotal) return "";
    const clr=pct>=100?"#57A773":pct>=50?"#5B8DD9":"#D4A843";
    const balClr=balance>0?"#E07B54":"#57A773";
    let html='<div style="padding:12px 16px;background:var(--card);border-bottom:1px solid var(--faint);">';
    if(pct!=null){
      html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-size:13px;font-weight:600;">Progress</span><span style="font-size:13px;font-weight:700;color:'+clr+';">'+pct+'%</span></div>';
      html+='<div style="background:var(--faint);border-radius:100px;height:8px;margin-bottom:10px;"><div style="background:'+clr+';border-radius:100px;height:8px;width:'+pct+'%;transition:width .3s;"></div></div>';
    }
    if(contractTotal){
      html+='<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;"><span style="color:var(--mid);">Contract</span><span style="font-weight:600;">'+money(contractTotal)+'</span></div>';
      html+='<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;"><span style="color:var(--mid);">Collected</span><span style="color:var(--green);font-weight:600;">'+money(collected)+'</span></div>';
      html+='<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;padding-top:8px;border-top:1px solid var(--faint);margin-bottom:10px;"><span>Balance Due</span><span style="color:'+balClr+';">'+money(balance)+'</span></div>';
      html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
      html+='<button data-id="'+p.id+'" onclick="sendBI(this.dataset.id)" style="background:#5b8dd9;color:#fff;border:none;border-radius:100px;padding:11px;font-size:12px;font-weight:600;cursor:pointer;">📧 Email Invoice</button>';
      html+='<button data-id="'+p.id+'" onclick="printBI(this.dataset.id)" style="background:var(--faint);color:var(--ink);border:none;border-radius:100px;padding:11px;font-size:12px;font-weight:600;cursor:pointer;">🖨️ Print Invoice</button>';
      html+='</div>';
    }
    html+='</div>';
    return html;
  })()}
  
  <div class="tab-bar" style="top:${isActive?108:68}px;">
    ${buildDetailTabs(t)}
  </div>
  <div style="padding:14px 16px 130px;">${content}</div>`;
}

// ─── SUMMARY VIEW ────────────────────────────────────────────
function summaryHTML(){
  var now = new Date();
  var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var thisMonth = now.getMonth(), thisYear = now.getFullYear();

  var totalEarned = state.projects.reduce(function(s,p){return s+(p.totalSeconds/3600*(p.hourlyRate||0));},0);
  var totalHours = state.projects.reduce(function(s,p){return s+p.totalSeconds;},0);
  var monthEarned = 0, monthHours = 0;

  state.projects.forEach(function(p){
    (p.sessions||[]).forEach(function(s){
      var d = new Date(s.date);
      if(d.getMonth()===thisMonth && d.getFullYear()===thisYear){
        monthEarned += (s.seconds/3600)*(p.hourlyRate||0);
        monthHours += s.seconds;
      }
    });
  });

  var monthMaterials = 0;
  (state.expenses||[]).forEach(function(e){
    var d = new Date(e.date||"");
    if(d.getMonth()===thisMonth && d.getFullYear()===thisYear) monthMaterials += Number(e.amount||0);
  });

  var net = monthEarned - monthMaterials;

  var h = topBar("Summary","","");
  h += '<div style="padding:16px 16px 130px;">';

  // Big hero total card
  h += '<div style="background:var(--yellow);border-radius:18px;padding:22px 20px;margin-bottom:10px;position:relative;overflow:hidden;">';

function initSignaturePad(){
  const canvas = document.getElementById("sig-canvas");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  ctx.strokeStyle = "#18181B";
  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  let drawing = false, lastX=0, lastY=0;
  const getPos = e => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  };
  canvas.onmousedown = canvas.ontouchstart = e => { e.preventDefault(); drawing=true; [lastX,lastY]=getPos(e); };
  canvas.onmousemove = canvas.ontouchmove = e => {
    e.preventDefault(); if(!drawing) return;
    const [x,y] = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke();
    [lastX,lastY]=[x,y];
  };
  canvas.onmouseup = canvas.ontouchend = () => drawing=false;
}

function clearSignature(){

}

function getBalanceDue(p){
  // Find linked contract/estimate total
  const linkedDoc = (state.docs||[]).find(d=>d.pid===p.id && (d.status==="Signed"||d.status==="Sent"||d.status==="Draft"));
  const contractTotal = linkedDoc ? linkedDoc.total : 0;
  // Total paid from invoices in project
  const paid = (p.invoices||[]).filter(i=>i.status==="Paid").reduce((s,i)=>s+i.amount,0);
  // Deposit from contract
  const deposit = linkedDoc ? linkedDoc.deposit : 0;
  const collected = Math.max(paid, deposit);
  return { contractTotal, collected, balance: contractTotal - collected, linkedDoc };
}

function sendBalanceInvoice(pid){
  const p = proj(pid);

}

// ─── EXPENSES VIEW ───────────────────────────────────────────
function expensesHTML(){
  const projOpts=state.projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("");
  const filterPid=state.form.expFilter||"";
  const filtered=filterPid?state.expenses.filter(e=>e.pid===filterPid):state.expenses;

  // Totals by type
  const totals={};
  EXPENSE_TYPES.forEach(t=>{totals[t]=filtered.filter(e=>e.type===t).reduce((s,e)=>s+e.amount,0);});
  const grandTotal=filtered.reduce((s,e)=>s+e.amount,0);

  const typeColors={"Materials":"#5B8DD9","Tools & Equipment":"#9B6EC8","Gas & Travel":"#D4A843"};

  const cards=filtered.map(e=>{
    const p=e.pid?proj(e.pid):null;
    return `<div class="card" style="border-left:4px solid ${typeColors[e.type]||"var(--mid)"};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="flex:1;">
          <div style="font-size:15px;font-weight:600;">${e.description}</div>
          <div style="font-size:12px;color:var(--mid);margin-top:2px;">${e.type}${p?" · "+p.name:""} · ${e.date}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:10px;">
          <div style="font-size:16px;font-weight:700;color:var(--red);">${money(e.amount)}</div>
          <button data-id="${e.id}" onclick="delExpense(this.dataset.id)" style="background:none;border:none;color:var(--mid);font-size:12px;cursor:pointer;">Delete</button>
        </div>
      </div>
      ${e.receipt?`<img src="${e.receipt}" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-top:10px;"/>`:""}
    </div>`;
  }).join("")||`<div class="empty">No expenses yet.<br/>Track every dollar you spend on jobs.</div>`;

  return `${topBar("Expenses","",`<button onclick="openSheet('newexpense',null,{})" style="background:var(--accent);color:#fff;border:none;border-radius:100px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">+ Add</button>`)}
  <div style="padding:14px 16px 130px;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
      <div class="card" style="text-align:center;background:var(--ink);border:none;grid-column:1/-1;">
        <div style="font-size:10px;color:var(--mid);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Total Spent</div>
        <div style="font-size:28px;font-weight:700;color:var(--red);">${money(grandTotal)}</div>
      </div>
      ${EXPENSE_TYPES.map(t=>`<div class="card" style="text-align:center;padding:12px;">
        <div style="font-size:10px;color:${typeColors[t]};text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">${t}</div>
        <div style="font-size:18px;font-weight:700;">${money(totals[t])}</div>
      </div>`).join("")}
    </div>
    <div style="margin-bottom:12px;">
      <select onchange="state.form.expFilter=this.value;render()" style="width:100%;">
        <option value="">All projects</option>
        ${projOpts}
      </select>
    </div>
    ${cards}
  </div>`;
}

// ─── SERVICES VIEW ───────────────────────────────────────────
function servicesHTML(){
  const cards=state.services.map(s=>`
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;">
      <div style="flex:1;">
        <div style="font-size:15px;font-weight:600;">${s.name}</div>
        ${s.description?`<div style="font-size:12px;color:var(--mid);margin-top:2px;">${s.description}</div>`:""}
        <div style="font-size:12px;color:var(--mid);margin-top:2px;">${s.unit==="hour"?"per hour":s.unit==="sqft"?"per sq ft":"flat rate"}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:12px;">
        <div style="font-size:17px;font-weight:700;color:var(--green);">${money(s.price)}</div>
        <div style="display:flex;gap:6px;margin-top:4px;justify-content:flex-end;">
          <button data-id="${s.id}" onclick="editService(this.dataset.id)" style="background:none;border:none;color:var(--mid);font-size:12px;cursor:pointer;font-weight:600;">Edit</button>
          <button data-id="${s.id}" onclick="delService(this.dataset.id)" style="background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;font-weight:600;">Del</button>
        </div>
      </div>
    </div>`).join("")||`<div class="empty">No services yet.<br/>Add your standard services and prices.<br/>Use them to build estimates fast.</div>`;

  return `${topBar("My Services","",`<button onclick="openSheet('newservice')" style="background:var(--accent);color:#fff;border:none;border-radius:100px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">+ Add</button>`)}
  <div style="padding:14px 16px 130px;">${cards}</div>`;
}


// ─── HELPER RENDER FUNCTIONS ─────────────────────────────────
function serviceQuickButtons(){
  if(!state.services.length) return "";
  let html='<div style="margin-bottom:8px;overflow-x:auto;white-space:nowrap;padding-bottom:4px;">';
  state.services.forEach(s=>{
    html+='<button onclick="addServiceToDoc(\"'+s.id+'\"" style="background:var(--faint);border:1px solid var(--border);border-radius:100px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;margin-right:6px;color:var(--ink);">'+esc(s.name)+' '+money(s.price)+'</button>';
  });
  html+='</div>';
  return html;
}

function docActionButtons(d){
  let html='';
  if(d.status!=="Paid"){
    html+='<button data-id="'+d.id+'" onclick="mPaid(this.dataset.id)" style="background:var(--green);color:#fff;border:none;border-radius:100px;padding:13px;font-size:13px;font-weight:600;cursor:pointer;">✓ Mark as Paid</button>';
    html+='<button data-id="'+d.id+'" onclick="sRemind(this.dataset.id)" class="btn-ghost" style="font-size:13px;">🔔 Send Reminder</button>';
  }
  if(d.opened){
    html+='<div style="font-size:11px;color:var(--green);text-align:center;margin-top:4px;">👁 Opened '+d.openedDate+'</div>';
  } else {
    html+='<button data-id="'+d.id+'" onclick="mOpened(this.dataset.id)" class="btn-ghost" style="font-size:12px;grid-column:1/-1;">👁 Mark as Opened</button>';
  }
  return html;
}
